apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mysql
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy: {}
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - image: mysql:8.0
        name: mysql
        envFrom:
          - secretRef:
              name: mysql
        volumeMounts:
          - name: data
            mountPath: /var/lib/mysql
        resources: {}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql
status: {}
